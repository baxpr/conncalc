# Processor for conncalc with Raichle 2011 set
# https://github.com/baxpr/conncalc
---
procyamlversion: 3.0.0-dev.0
containers:
  - name: conncalc
    path: conncalc_v1.9.1.sif
    source: docker://baxterprogers/conncalc:v1.9.1
requirements:
  walltime: '2:00:00'
  memory: 16G
jobtemplate: job_template_v3.txt

inputs:
  xnat:
    filters:
      - type: match
        inputs: assr_cat12,assr_connprep/assr_cat12
      - type: match
        inputs: scan_fmri,assr_connprep/scan_fmri
    scans:
      - name: scan_fmri
        types: rest
        nifti: fmri.nii.gz
        skip_unusable: True
    assessors:
      - name: assr_connprep
        proctypes: connprep_sgl_v2
        resources:
          - {resource: FILTERED_REMOVEGM_MNI, fdest: removegm.nii.gz}
          - {resource: FILTERED_KEEPGM_MNI, fdest: keepgm.nii.gz}
          - {resource: BRAIN_MASK_MNI, fdest: mask.nii.gz}
          - {resource: MEAN_FMRI_MNI, fdest: meanfmri.nii.gz}
      - name: assr_cat12
        proctypes: cat12_ss2p0_v2
        resources:
          - {resource: BIAS_NORM, fdest: t1.nii.gz}
          
outputs:
  - pdf: PDF/conncalc.pdf
  - dir: DFMATRIX
  - dir: MASK
  - dir: RMATRIX
  - dir: ROIDATA
  - dir: ROILABELS
  - dir: ROIS
  - dir: ZMAPS_KEEPGM
  - dir: ZMAPS_REMOVEGM
  - dir: ZMATRIX

command: 
  type: singularity_exec
  container: conncalc
  extraopts: -B /data/mcr/centos7/FS6/license.txt:/usr/local/freesurfer/.license
  args: >-
    bash -c '
    cd /OUTPUTS &&
    wget https://github.com/baxpr/conncalc/archive/refs/tags/v2.0.0.zip &&
    unzip v2.0.0.zip &&
    mv conncalc-2.0.0 conncalc &&
    xwrapper.sh conncalc.sh 
    --roi_niigz /OUTPUTS/conncalc/rois/RusjanDLPFC.nii.gz
    --roilabel_csv /OUTPUTS/conncalc/rois/RusjanDLPFC-labels.csv
    --connmaps_out yes
    --removegm_niigz /INPUTS/removegm.nii.gz
    --keepgm_niigz /INPUTS/keepgm.nii.gz
    --meanfmri_niigz /INPUTS/meanfmri.nii.gz
    --mask_niigz /INPUTS/mask.nii.gz
    --t1_niigz /INPUTS/t1.nii.gz
    --fwhm 6
    --out_dir /OUTPUTS
    '
